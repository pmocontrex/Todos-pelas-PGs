<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projex — Controle de Projetos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --c-bg: #F7F8FC;
  --c-surface: #FFFFFF;
  --c-surface2: #F0F2F8;
  --c-border: #E2E6F0;
  --c-primary: #1B3A5C;
  --c-primary-light: #2657a0;
  --c-accent: #E8A020;
  --c-accent-light: #FDF3E0;
  --c-text: #1A2233;
  --c-text-2: #5A6478;
  --c-text-3: #8A96A8;
  --c-danger: #D94545;
  --c-danger-light: #FDF0F0;
  --c-success: #1E8A5A;
  --c-success-light: #EBF8F2;
  --c-warning: #C07A10;
  --c-warning-light: #FEF5E7;
  --c-info: #2657a0;
  --c-info-light: #EBF1FB;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(27,58,92,0.07), 0 1px 2px rgba(27,58,92,0.04);
  --shadow-md: 0 4px 16px rgba(27,58,92,0.10), 0 1px 4px rgba(27,58,92,0.06);
  --shadow-lg: 0 8px 32px rgba(27,58,92,0.13), 0 2px 8px rgba(27,58,92,0.07);
  --font-main: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-main); background: var(--c-bg); color: var(--c-text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* ── LOGIN ── */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f2240 0%, #1B3A5C 55%, #2657a0 100%);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.login-page::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
  top: -150px; right: -100px;
  pointer-events: none;
}
.login-page::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(38,87,160,0.3) 0%, transparent 70%);
  bottom: -100px; left: -80px;
  pointer-events: none;
}
.login-card {
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.08);
  animation: slideUp 0.5s cubic-bezier(.4,0,.2,1);
  position: relative;
  z-index: 1;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-logos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 32px;
}
.login-logos img { object-fit: contain; display: block; }
.logo-projex { height: 64px; }
.logo-contrex { height: 44px; }
.logo-divider {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, transparent, var(--c-border), transparent);
}
.login-title {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--c-primary);
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.login-sub {
  text-align: center;
  color: var(--c-text-2);
  font-size: 13px;
  margin-bottom: 28px;
}
.field-group { margin-bottom: 16px; }
.field-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--c-text-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.field-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-main);
  font-size: 14px;
  color: var(--c-text);
  background: var(--c-bg);
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.field-group input:focus {
  border-color: var(--c-primary-light);
  box-shadow: 0 0 0 3px rgba(38,87,160,0.12);
  background: #fff;
}
.btn-login {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-primary-light) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-main);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.2px;
  transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 14px rgba(27,58,92,0.25);
}
.btn-login:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(27,58,92,0.3); }
.btn-login:active { transform: translateY(0); }
.login-erro {
  color: var(--c-danger);
  font-size: 13px;
  margin-top: 10px;
  text-align: center;
  min-height: 18px;
}

/* ── APP LAYOUT ── */
.app-shell { display: flex; flex-direction: column; min-height: 100vh; }

/* Topbar */
.topbar {
  background: var(--c-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(27,58,92,0.18);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-logo { height: 32px; object-fit: contain; }
.topbar-appname {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: -0.3px;
  color: #fff;
  opacity: 0.95;
}
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-user {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  font-weight: 500;
}
.btn-logout {
  padding: 6px 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 20px;
  font-size: 13px;
  font-family: var(--font-main);
  cursor: pointer;
  transition: background var(--transition);
}
.btn-logout:hover { background: rgba(255,255,255,0.2); }

/* Navbar */
.navbar {
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 24px;
  position: sticky;
  top: 58px;
  z-index: 99;
  box-shadow: var(--shadow-sm);
}
.nav-btn {
  padding: 14px 18px;
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  color: var(--c-text-2);
  font-family: var(--font-main);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
  white-space: nowrap;
  border-radius: 0;
  width: auto;
  margin: 0;
}
.nav-btn:hover { color: var(--c-primary); }
.nav-btn.active, .nav-btn:focus-visible { color: var(--c-primary); border-bottom-color: var(--c-accent); outline: none; }
.nav-btn.painel-btn { color: var(--c-primary-light); font-weight: 600; }

/* Main content */
.main-content { padding: 28px 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

/* Page title */
.page-title {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--c-primary);
  margin-bottom: 20px;
  letter-spacing: -0.3px;
}

/* Filtros */
.filtros-bar {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  display: flex;
  align-items: flex-end;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.filtros-bar label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--c-text-2);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.filtros-bar input, .filtros-bar select {
  padding: 8px 12px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-main);
  font-size: 13px;
  color: var(--c-text);
  background: var(--c-bg);
  outline: none;
  transition: border-color var(--transition);
  min-width: 140px;
  width: auto;
  margin: 0;
}
.filtros-bar input:focus, .filtros-bar select:focus { border-color: var(--c-primary-light); }
.filtros-check { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--c-text-2); font-weight: 500; padding-bottom: 2px; cursor: pointer; }
.filtros-check input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--c-primary); cursor: pointer; }

/* Botões */
button { font-family: var(--font-main); cursor: pointer; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; transition: all var(--transition); width: auto; margin: 0; }
.btn-primary { background: var(--c-primary); color: #fff; box-shadow: 0 2px 8px rgba(27,58,92,0.18); }
.btn-primary:hover { background: var(--c-primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(27,58,92,0.22); }
.btn-success { background: var(--c-success); color: #fff; }
.btn-success:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-warning { background: var(--c-accent); color: #fff; }
.btn-warning:hover { opacity: 0.88; }
.btn-danger { background: var(--c-danger); color: #fff; }
.btn-danger:hover { opacity: 0.88; }
.btn-ghost { background: var(--c-surface); color: var(--c-text-2); border: 1.5px solid var(--c-border); }
.btn-ghost:hover { border-color: var(--c-primary-light); color: var(--c-primary); }
.btn-purple { background: #6B4FBB; color: #fff; }
.btn-purple:hover { opacity: 0.88; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.acoes-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }

/* Cards de projeto */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 18px; }
.proj-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
  position: relative;
  overflow: hidden;
}
.proj-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--c-primary-light);
  opacity: 0;
  transition: opacity var(--transition);
}
.proj-card { cursor: pointer; }
.proj-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: #c8d4e8; }
.proj-card:hover::before { opacity: 1; }
.proj-card h3 { font-size: 15px; font-weight: 600; color: var(--c-primary); margin-bottom: 8px; line-height: 1.3; }
.proj-card p { font-size: 12.5px; color: var(--c-text-2); margin-bottom: 3px; }
.proj-card .card-durante { font-size: 12px; color: var(--c-text-3); margin: 6px 0; }
.progress-wrap { background: var(--c-surface2); border-radius: 99px; height: 6px; margin: 10px 0 4px; overflow: hidden; }
.progress-fill { height: 6px; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); background: var(--c-success); }
.progress-fill.amarelo { background: var(--c-accent); }
.progress-fill.vermelho { background: var(--c-danger); }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.card-perc { font-size: 11.5px; color: var(--c-text-3); font-weight: 500; }
.badge-atraso { display: inline-flex; align-items: center; gap: 4px; background: var(--c-danger-light); color: var(--c-danger); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }

/* Badges status */
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-atrasada { background: var(--c-danger-light); color: var(--c-danger); }
.badge-concluida { background: var(--c-success-light); color: var(--c-success); }
.badge-prazo { background: var(--c-info-light); color: var(--c-info); }

/* Tabelas */
.table-wrap { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
.tabela-wrap { overflow-y: auto; max-height: calc(100vh - 240px); border-radius: var(--radius-md); border: 1px solid var(--c-border); box-shadow: var(--shadow-sm); }
table { width: 100%; border-collapse: collapse; background: var(--c-surface); }
thead th { background: var(--c-primary); color: #fff; padding: 11px 14px; text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
.tabela-wrap thead th { cursor: pointer; user-select: none; transition: background var(--transition); }
.tabela-wrap thead th:hover { background: var(--c-primary-light); }
.sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.65; }
tbody tr { border-bottom: 1px solid var(--c-border); transition: background var(--transition); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--c-surface2); }
tbody td { padding: 10px 14px; font-size: 13px; color: var(--c-text); }
tbody td a { color: var(--c-primary-light); text-decoration: none; }
tbody td a:hover { text-decoration: underline; }

/* Formulários */
.form-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius-md); padding: 24px 28px; max-width: 620px; margin-top: 20px; box-shadow: var(--shadow-sm); }
.form-card h3 { font-family: var(--font-display); font-size: 18px; color: var(--c-primary); margin-bottom: 18px; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 11.5px; font-weight: 600; color: var(--c-text-2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
.form-field input, .form-field select {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-main); font-size: 13.5px;
  color: var(--c-text); background: var(--c-bg);
  outline: none; transition: border-color var(--transition), box-shadow var(--transition);
  margin: 0;
}
.form-field input:focus, .form-field select:focus { border-color: var(--c-primary-light); box-shadow: 0 0 0 3px rgba(38,87,160,0.1); background: #fff; }
.form-field input[readonly] { background: var(--c-surface2); color: var(--c-text-3); cursor: not-allowed; }
.form-btns { display: flex; gap: 10px; margin-top: 20px; }

/* Proj header fixo */
.proj-header { position: sticky; top: 116px; background: var(--c-bg); z-index: 50; padding: 12px 0 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--c-border); margin-bottom: 16px; }
.proj-header h2 { font-family: var(--font-display); font-size: 20px; color: var(--c-primary); }

/* Kanban */
.kanban-wrap { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 4px; }
.kanban-col { background: var(--c-surface2); border-radius: var(--radius-md); padding: 14px; min-height: 200px; border: 1px solid var(--c-border); }
.kanban-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 10px; border-radius: var(--radius-sm); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.col-nao .kanban-col-title { background: #EEF0F5; color: var(--c-text-2); }
.col-and .kanban-col-title { background: var(--c-info-light); color: var(--c-info); }
.col-conc .kanban-col-title { background: var(--c-success-light); color: var(--c-success); }
.kanban-count { background: rgba(255,255,255,0.7); border-radius: 99px; padding: 1px 8px; font-size: 11px; }
.kanban-card { background: var(--c-surface); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--c-border); box-shadow: var(--shadow-sm); transition: box-shadow var(--transition), transform var(--transition); border-left: 3px solid var(--c-border); }
.kanban-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.kanban-card.atrasada { border-left-color: var(--c-danger); }
.kanban-card.no-prazo { border-left-color: var(--c-success); }
.kanban-card strong { font-size: 13px; color: var(--c-text); line-height: 1.4; display: block; margin-bottom: 6px; }
.kanban-card .kc-meta { font-size: 11.5px; color: var(--c-text-3); margin-bottom: 4px; }
.kanban-card .kc-btns { margin-top: 8px; }

/* Import box */
.import-box { background: #EBF4FD; border: 1.5px dashed #90BAE0; border-radius: var(--radius-md); padding: 20px 22px; margin-top: 16px; }
.import-box h4 { font-size: 14px; font-weight: 600; color: var(--c-primary); margin-bottom: 8px; }
.import-box input[type=file] { background: var(--c-surface); border: 1.5px solid var(--c-border); border-radius: var(--radius-sm); padding: 8px 12px; width: 100%; margin: 8px 0; font-family: var(--font-main); }

/* Acessos */
.secao-acessos { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--c-border); }
.secao-acessos h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--c-text-2); margin-bottom: 10px; }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
.checkbox-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--c-text); min-width: 180px; cursor: pointer; }
.checkbox-item input { width: 15px; height: 15px; accent-color: var(--c-primary); cursor: pointer; }

/* Dashboard */
.dash-cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
.dash-card { border-radius: var(--radius-md); padding: 22px 20px; position: relative; overflow: hidden; }
.dash-card::after { content: ''; position: absolute; right: -20px; bottom: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1); }
.dash-card h2 { font-size: 38px; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 6px; }
.dash-card p { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 0.5px; }
.dc-nao { background: linear-gradient(135deg, #5A6478, #7A8498); }
.dc-atraso { background: linear-gradient(135deg, #C03535, #E05050); }
.dc-andamento { background: linear-gradient(135deg, #1A4F8A, #2657a0); }
.dc-concluida { background: linear-gradient(135deg, #166A45, #1E8A5A); }

/* Gantt */
.gantt-wrap { overflow: auto; max-height: 65vh; border: 1px solid var(--c-border); border-radius: var(--radius-md); margin-top: 12px; box-shadow: var(--shadow-sm); }
.gantt-table { border-collapse: collapse; min-width: 100%; background: var(--c-surface); }
.gantt-table th, .gantt-table td { border: 1px solid var(--c-border); padding: 7px 10px; white-space: nowrap; font-size: 12px; }
.gantt-table th { background: var(--c-primary); color: #fff; position: sticky; top: 0; z-index: 2; font-weight: 600; }
.gantt-table th.col-nome { position: sticky; left: 0; z-index: 3; background: var(--c-primary); min-width: 190px; }
.gantt-table td.col-nome { position: sticky; left: 0; background: var(--c-surface); z-index: 1; font-weight: 600; font-size: 12px; min-width: 190px; color: var(--c-primary); border-right: 2px solid var(--c-border); }
.gantt-bar { height: 16px; border-radius: 4px; display: inline-block; min-width: 4px; }
.bar-prep { background: linear-gradient(90deg, #2657a0, #4A7FC0); }
.bar-durante { background: linear-gradient(90deg, #166A45, #1E8A5A); }
.bar-desmob { background: linear-gradient(90deg, #B06010, #E8A020); }
.gantt-legenda { display: flex; gap: 18px; margin-bottom: 10px; flex-wrap: wrap; }
.gantt-legenda span { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--c-text-2); font-weight: 500; }
.gantt-legenda i { display: inline-block; width: 16px; height: 10px; border-radius: 3px; }

/* Loading */
.loading-state { text-align: center; padding: 60px 20px; color: var(--c-text-3); }
.loading-state::before { content: ''; display: block; width: 32px; height: 32px; border: 3px solid var(--c-border); border-top-color: var(--c-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Erro */
.erro-msg { color: var(--c-danger); font-size: 13px; background: var(--c-danger-light); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 8px; }

<script>

const API_BASE_URL = '/api/proxy';
let token = null, usuario = null;
let _cacheProjetos = null, _cacheTarefas = null;

// ===== UTILIDADES DE DATA =====
function isoParaBR(iso) {
  if (!iso || iso === '—') return '—';
  const p = iso.split('-');
  if (p.length === 3) return p[2]+'/'+p[1]+'/'+p[0];
  return iso;
}
function brParaISO(br) {
  if (!br) return '';
  const p = br.split('/');
  if (p.length === 3) return p[2]+'-'+p[1]+'-'+p[0];
  return br;
}
function parseISO(s) {
  if (!s) return null;
  const p = s.split('-');
  if (p.length !== 3) return null;
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function addDias(iso, n) {
  const d = parseISO(iso);
  if (!d) return iso;
  d.setDate(d.getDate() + n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function hoje() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ===== API =====
async function apiRequest(path, method, data, includeToken) {
  if (method === undefined) method = 'GET';
  if (includeToken === undefined) includeToken = true;
  const url = new URL(API_BASE_URL, window.location.origin);
  url.searchParams.append('path', path);
  const payload = { _method: method };
  if (includeToken && token) payload.token = token;
  if (method === 'GET' && data) Object.keys(data).forEach(k => url.searchParams.append(k, data[k]));
  else if (data) Object.assign(payload, data);
  const r = await fetch(url.toString(), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  const res = await r.json();
  if (!res.success) throw new Error(res.error);
  return res.data;
}

// ===== LOGIN =====
async function fazerLogin() {
  const l = document.getElementById('login').value.trim();
  const s = document.getElementById('senha').value;
  const err = document.getElementById('erroLogin');
  if (!l || !s) { err.innerText = 'Preencha usuário e senha.'; return; }
  err.innerText = 'Autenticando...';
  try {
    const data = await apiRequest('login','POST',{login:l,senha:s},false);
    token = data.token; usuario = data.usuario;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    document.getElementById('usuarioNome').innerText = 'Olá, '+usuario.nome+' ('+usuario.nivel+')';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = usuario.nivel==='Administrador'?'inline-block':'none');
    mudarTela('painel');
  } catch(e) { err.innerText = 'Erro: '+e.message; }
}
function logout() {
  token=null; usuario=null; _cacheProjetos=null; _cacheTarefas=null;
  document.getElementById('loginPage').style.display='block';
  document.getElementById('appShell').style.display='none';
  document.getElementById('login').value='';
  document.getElementById('senha').value='';
  document.getElementById('erroLogin').innerText='';
}
function mudarTela(tela) {
  _cacheProjetos=null; _cacheTarefas=null;
  if (tela==='painel') carregarPainel();
  else if (tela==='projetos') carregarListaProjetos();
  else if (tela==='tarefas') carregarListaTarefas();
  else if (tela==='usuarios') carregarListaUsuarios();
  else if (tela==='dashboard') carregarDashboard();
}

// ===== PAINEL VISÃO GERAL =====
async function carregarPainel() {
  document.getElementById('conteudo').innerHTML = '<div class="loading-state">Carregando projetos...</div>';
  try {
    const [projetos, todasTarefas] = await Promise.all([
      apiRequest('projetos','GET'),
      apiRequest('tarefas','GET')
    ]);
    _cacheProjetos = Array.isArray(projetos) ? projetos : [];
    _cacheTarefas = Array.isArray(todasTarefas) ? todasTarefas : [];

    // Monta mapa de tarefas por projeto
    window._tarefasPorProjeto = {};
    _cacheTarefas.forEach(t => {
      if (!window._tarefasPorProjeto[t.projeto]) window._tarefasPorProjeto[t.projeto] = [];
      window._tarefasPorProjeto[t.projeto].push(t);
    });

    const hoje_iso = hoje();
    // Calcula stats de cada projeto
    _cacheProjetos.forEach(p => {
      const arr = window._tarefasPorProjeto[p.nome] || [];
      const total = arr.length;
      const concluidas = arr.filter(t => t.status==='Concluída').length;
      const atraso = arr.filter(t => t.sinalizador==='Atrasada').length;
      p._total = total; p._concluidas = concluidas; p._atraso = atraso;
      p._perc = total > 0 ? Math.round((concluidas/total)*100) : 0;
      p._concluido = total > 0 && concluidas === total;
    });

    let html = '<h2 class="page-title">📊 Visão Geral de Projetos</h2>';
    html += '<div class="filtros-bar" id="filtrosPainel">';
    // Filtro por projeto (select)
    html += '<label>Projeto<select id="filtroProjeto" style="min-width:180px;"><option value="">Todos</option>';
    _cacheProjetos.forEach(p => { html += '<option value="'+p.nome+'">'+p.nome+'</option>'; });
    html += '</select></label>';
    html += '<label>Tipo<select id="filtroTipo"><option value="">Todos</option><option>PG</option><option>Rotina</option><option>Projeto</option></select></label>';
    html += '<label>Ordenar por<select id="filtroOrdem"><option value="nome">Nome</option><option value="durante">Data Durante</option></select></label>';
    html += '<label class="filtros-check"><input type="checkbox" id="filtroSoAtraso"> Somente com atrasos</label>';
    html += '<label class="filtros-check"><input type="checkbox" id="filtroOcultarConc"> Ocultar concluídos</label>';
    html += '<button class="btn btn-primary" onclick="aplicarFiltrosPainel()">Filtrar</button>';
    html += '</div>';
    html += '<div id="listaProjetos" class="card-grid"></div>';
    document.getElementById('conteudo').innerHTML = html;
    aplicarFiltrosPainel();
  } catch(e) { alert('Erro ao carregar: '+e.message); }
}

function aplicarFiltrosPainel() {
  const fp = (document.getElementById('filtroProjeto')||{}).value||'';
  const ft = (document.getElementById('filtroTipo')||{}).value||'';
  const ordem = (document.getElementById('filtroOrdem')||{}).value||'nome';
  const soAtraso = (document.getElementById('filtroSoAtraso')||{}).checked||false;
  const ocultarConc = (document.getElementById('filtroOcultarConc')||{}).checked||false;

  let lista = (_cacheProjetos||[]).slice();

  if (fp) lista = lista.filter(p => p.nome === fp);
  if (ft) lista = lista.filter(p => p.tipo === ft);
  if (soAtraso) lista = lista.filter(p => p._atraso > 0);
  if (ocultarConc) lista = lista.filter(p => !p._concluido);

  // Ordenar
  lista.sort((a,b) => {
    if (ordem==='durante') {
      const da = parseISO(a.inicioDurante)||new Date(9999,0,1);
      const db = parseISO(b.inicioDurante)||new Date(9999,0,1);
      return da - db;
    }
    return a.nome.localeCompare(b.nome);
  });

  let html = '';
  lista.forEach(p => {
    const percCor = p._perc >= 100 ? '' : p._atraso > 0 ? ' vermelho' : p._perc >= 50 ? ' amarelo' : '';
    const durante = (p.inicioDurante && p.fimDurante)
      ? 'Durante: '+isoParaBR(p.inicioDurante)+' — '+isoParaBR(p.fimDurante)
      : '—';
    const nome = p.nome.replace(/'/g,"\\'");
    html += '<div class="proj-card" onclick="verDetalhesProjeto(\''+nome+'\', event)">';
    html += '<h3>'+p.nome+'</h3>';
    html += '<p><strong>Cliente:</strong> '+(p.cliente||'—')+'</p>';
    html += '<p><strong>Tipo:</strong> '+p.tipo+' | <strong>Unidade:</strong> '+(p.unidade||'—')+'</p>';
    html += '<p>'+durante+'</p>';
    if (p._atraso > 0) html += '<span class="badge-atraso">⚠ '+p._atraso+' em atraso</span>';
    html += '<div class="progress-wrap"><div class="progress-fill'+percCor+'" style="width:'+p._perc+'%"></div></div>';
    html += '<p style="font-size:12px;color:#666;">% Conclusão: '+p._perc+'% ('+p._concluidas+'/'+p._total+')</p>';
    html += '</div>';
  });
  document.getElementById('listaProjetos').innerHTML = html || '<p>Nenhum projeto encontrado.</p>';
}

// Estado de ordenação e modo de visualização do projeto
window._projSort = { col: 'prazo', dir: 1 };
window._projModo = 'lista';
window._projTarefas = [];
window._projNome = '';

async function verDetalhesProjeto(projetoNome, evt) {
  if (evt) evt.stopPropagation();
  document.getElementById('conteudo').innerHTML = '<div class="loading-state">Carregando tarefas...</div>';
  try {
    const tarefas = await apiRequest('tarefas','GET',{projeto:projetoNome});
    window._projTarefas = Array.isArray(tarefas)?tarefas:[];
    window._projNome = projetoNome;
    window._projSort = { col: 'prazo', dir: 1 };
    window._projModo = 'lista';
    renderDetalhesProjeto();
  } catch(e) { alert('Erro: '+e.message); }
}

function renderDetalhesProjeto() {
  const projetoNome = window._projNome;
  const nome = projetoNome.replace(/'/g,"\'");
  const arr = window._projTarefas.slice();
  const { col, dir } = window._projSort;
  arr.sort((a,b) => {
    let va = a[col]||'', vb = b[col]||'';
    if (col==='id') { va=+va; vb=+vb; }
    if (va < vb) return -1*dir;
    if (va > vb) return 1*dir;
    return 0;
  });
  let html = '<div class="proj-header">';
  html += '<button class="btn btn-ghost" onclick="history.back()">← Voltar</button>';
  html += '<h2>📁 '+projetoNome+'</h2>';
  html += '<button class="btn btn-purple" onclick="alternarModoProjeto()">'+(window._projModo==='lista'?'🗂️ Kanban':'📋 Lista')+'</button>';
  html += '</div>';
  if (window._projModo === 'kanban') {
    html += renderKanbanProjeto(arr, nome);
  } else {
    html += renderListaProjeto(arr, nome);
  }
  document.getElementById('conteudo').innerHTML = html;
}

function renderListaProjeto(arr, nome) {
  const cols = [
    { key:'id', label:'ID' }, { key:'tarefa', label:'Tarefa' },
    { key:'prazo', label:'Prazo' }, { key:'status', label:'Status' },
    { key:'sinalizador', label:'Situação' }
  ];
  let html = '<div class="tabela-wrap"><table><thead><tr>';
  cols.forEach(c => {
    const ativo = window._projSort.col===c.key;
    const icon = ativo ? (window._projSort.dir===1?'▲':'▼') : '⇅';
    html += '<th data-col="'+c.key+'" onclick="sortProjeto(this.getAttribute(\'data-col\'))"><span style="cursor:pointer;">'+c.label+' <span class="sort-icon">'+icon+'</span></span></th>';
  });
  html += '<th>Anexo</th><th>Ação</th></tr></thead><tbody>';
  arr.forEach(t => {
    const bc = t.sinalizador==='Atrasada'?'badge-atrasada':t.sinalizador==='Concluída'?'badge-concluida':'badge-prazo';
    html += '<tr>';
    html += '<td>'+t.id+'</td><td>'+t.tarefa+'</td><td>'+isoParaBR(t.prazo)+'</td><td>'+t.status+'</td>';
    html += '<td><span class="badge '+bc+'">'+t.sinalizador+'</span></td>';
    html += '<td>'+(t.anexo?'<a href="'+t.anexo+'" target="_blank">📎</a>':'—')+'</td>';
    html += '<td><button class="btn btn-sm btn-ghost" onclick="editarTarefa('+t.id+', &quot;'+nome+'&quot;)">Editar</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderKanbanProjeto(arr, nome) {
  const grupos = { 'Não iniciada':[], 'Em andamento':[], 'Concluída':[] };
  arr.forEach(t => { (grupos[t.status]||grupos['Não iniciada']).push(t); });
  const colunas = [
    { key:'Não iniciada', cls:'col-nao', label:'Não Iniciada' },
    { key:'Em andamento', cls:'col-and', label:'Em Andamento' },
    { key:'Concluída', cls:'col-conc', label:'Concluída' }
  ];
  let html = '<div class="kanban-wrap">';
  colunas.forEach(col => {
    html += '<div class="kanban-col '+col.cls+'"><h4>'+col.label+' ('+grupos[col.key].length+')</h4>';
    grupos[col.key].forEach(t => {
      const cls = t.sinalizador==='Atrasada'?'atrasada':'no-prazo';
      const bc = t.sinalizador==='Atrasada'?'badge-atrasada':t.sinalizador==='Concluída'?'badge-concluida':'badge-prazo';
      html += '<div class="kanban-card '+cls+'">';
      html += '<strong>'+t.tarefa+'</strong>';
      html += '<p>📅 '+isoParaBR(t.prazo)+'</p>';
      html += '<p><span class="badge '+bc+'">'+t.sinalizador+'</span></p>';
      if (t.anexo) html += '<p><a href="'+t.anexo+'" target="_blank">📎 Anexo</a></p>';
      html += '<div class="kc-btns"><button class="btn btn-sm btn-ghost" onclick="editarTarefa('+t.id+', &quot;'+nome+'&quot;)">Editar</button></div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function sortProjeto(col) {
  window._projSort.dir = window._projSort.col===col ? window._projSort.dir*-1 : 1;
  window._projSort.col = col;
  renderDetalhesProjeto();
}

function alternarModoProjeto() {
  window._projModo = window._projModo==='lista' ? 'kanban' : 'lista';
  renderDetalhesProjeto();
}
async function editarTarefa(id, projetoNome) {
  try {
    const tarefas = await apiRequest('tarefas','GET');
    const tarefa = (Array.isArray(tarefas)?tarefas:[]).find(t=>t.id==id);
    if (!tarefa) return;
    const nome = projetoNome.replace(/'/g,"\\'");
    let html = '<h3>Editar Tarefa #'+id+'</h3>';
    html += '<button onclick="verDetalhesProjeto(\''+nome+'\')" style="width:auto;margin-bottom:10px;">← Voltar</button>';
    html += '<div class="form-card">';
    html += '<div class="form-field"><label>Status</label><select id="statusTarefa">';
    ['Não iniciada','Em andamento','Concluída'].forEach(s => {
      html += '<option value="'+s+'" '+(tarefa.status===s?'selected':'')+'>'+s+'</option>';
    });
    html += '</select>';
    html += '<div class="form-field"><label>Data Conclusão</label><input type="date" id="dataConclusao" value="'+(tarefa.dataConclusao||'')+'"></div>';
    html += '<div class="form-field"><label>Anexo (PDF/imagem)</label><input type="file" id="anexoFile" accept=".pdf,.png,.jpg,.jpeg"></div>';
    if (tarefa.anexo) html += '<p style="font-size:12px;margin-top:4px;">Anexo atual: <a href="'+tarefa.anexo+'" target="_blank">📎 Ver</a></p>';
    html += '<div class="form-btns"><button class="btn btn-primary" onclick="salvarEdicaoTarefa('+id+', &quot;'+nome+'&quot;)">💾 Salvar</button></div>';
    document.getElementById('conteudo').innerHTML = html;
  } catch(e) { alert('Erro: '+e.message); }
}

async function salvarEdicaoTarefa(id, projetoNome) {
  const status = document.getElementById('statusTarefa').value;
  const dataConclusao = document.getElementById('dataConclusao').value;
  const arquivo = document.getElementById('anexoFile').files[0];
  const payload = { id, status, dataConclusao };
  async function enviar() {
    try { await apiRequest('tarefas','PUT',payload); alert('Tarefa atualizada!'); verDetalhesProjeto(projetoNome); }
    catch(e) { alert('Erro: '+e.message); }
  }
  if (arquivo) {
    const reader = new FileReader();
    reader.onload = async e => { payload.anexoBase64=e.target.result; payload.nomeArquivo=arquivo.name; await enviar(); };
    reader.readAsDataURL(arquivo);
  } else await enviar();
}

// ===== PROJETOS (admin) =====
async function carregarListaProjetos() {
  document.getElementById('conteudo').innerHTML = '<div class="loading-state">Carregando...</div>';
  try {
    const projetos = await apiRequest('projetos','GET');
    const arr = Array.isArray(projetos)?projetos:[];
    let html = '<h2 class="page-title">📁 Gerenciar Projetos</h2>';
    html += '<div class="acoes-bar"><button onclick="mostrarFormProjeto()">+ Novo Projeto</button></div>';
    html += '<table><tr><th>ID</th><th>Nome</th><th>Tipo</th><th>Cliente</th><th>Unidade</th><th>C.Custo</th><th>Início Prep.</th><th>Início Durante</th><th>Fim Durante</th><th>Fim Desmob.</th><th>Ações</th></tr>';
    arr.forEach(p => {
      html += '<tr><td>'+p.id+'</td><td>'+p.nome+'</td><td>'+p.tipo+'</td><td>'+(p.cliente||'—')+'</td><td>'+(p.unidade||'—')+'</td><td>'+(p.centroCusto||'—')+'</td>';
      html += '<td>'+isoParaBR(p.inicioPrep)+'</td><td>'+isoParaBR(p.inicioDurante)+'</td><td>'+isoParaBR(p.fimDurante)+'</td><td>'+isoParaBR(p.fimDesmob)+'</td>';
      html += '<td><button class="btn btn-sm btn-ghost" onclick="editarProjeto('+p.id+')">✏️</button> <button class="btn-pequeno btn-danger" onclick="excluirProjeto('+p.id+')">🗑️</button></td></tr>';
    });
    html += '</table><div id="formProjetoContainer"></div>';
    document.getElementById('conteudo').innerHTML = html;
  } catch(e) { alert('Erro: '+e.message); }
}

function mostrarFormProjeto(p) {
  if (!p) p = {id:null,nome:'',tipo:'PG',cliente:'',unidade:'',centroCusto:'',inicioPrep:'',inicioDurante:'',fimDurante:'',fimDesmob:''};
  const tipos = ['PG','Rotina','Projeto'];
  let html = '<h3>'+(p.id?'Editar Projeto':'Novo Projeto')+'</h3><div class="form-card">';
  html += '<div class="form-field"><label>Nome</label><input type="text" id="projNome" value="'+p.nome+'">';
  html += '<label>Tipo</label><select id="projTipo">'+tipos.map(t=>'<option value="'+t+'" '+(p.tipo===t?'selected':'')+'>'+t+'</option>').join('')+'</select>';
  html += '<label>Cliente</label><input type="text" id="projCliente" value="'+(p.cliente||'')+'">';
  html += '<label>Unidade</label><input type="text" id="projUnidade" value="'+(p.unidade||'')+'">';
  html += '<label>Centro de Custo</label><input type="number" id="projCentro" value="'+(p.centroCusto||'')+'">';
  html += '<label>Início Preparativo</label><input type="date" id="projInicioPrep" value="'+(p.inicioPrep||'')+'">';
  html += '<label>Início Durante</label><input type="date" id="projInicioDurante" value="'+(p.inicioDurante||'')+'">';
  html += '<label>Fim Durante</label><input type="date" id="projFimDurante" value="'+(p.fimDurante||'')+'">';
  html += '<label>Fim Desmobilização</label><input type="date" id="projFimDesmob" value="'+(p.fimDesmob||'')+'">';
  html += '<div class="form-btns"><button onclick="salvarProjeto('+p.id+')">💾 Salvar</button><button onclick="carregarListaProjetos()" style="background:#888;">Cancelar</button></div>';
  html += '</div>';
  document.getElementById('formProjetoContainer').innerHTML = html;
  document.getElementById('formProjetoContainer').scrollIntoView({behavior:'smooth'});
}

async function editarProjeto(id) {
  const projetos = await apiRequest('projetos','GET');
  const p = (Array.isArray(projetos)?projetos:[]).find(p=>p.id==id);
  if (p) mostrarFormProjeto(p);
}

async function salvarProjeto(id) {
  const nome = document.getElementById('projNome').value.trim();

async function excluirProjeto(id) {

    const tarefas = await apiRequest('tarefas','GET');

async function mostrarFormTarefa(tarefa) {
  if (!tarefa) tarefa = {id:null,tarefa:'',projeto:'',centroCusto:'',prazo:'',status:'Não iniciada',anexoObrigatorio:'Não'};
  const projetos = await apiRequest('projetos','GET');
  const arrProj = Array.isArray(projetos)?projetos:[];
  let html = '<h3>'+(tarefa.id?'Editar Tarefa':'Nova Tarefa')+'</h3><div class="form-card">';
  html += '<label>Descrição</label><input type="text" id="tarDesc" value="'+tarefa.tarefa+'">';
  html += '<label>Projeto</label><select id="tarProjeto" onchange="buscarCentroCusto(this.value)"><option value="">Selecione...</option>';
  arrProj.forEach(p => { html += '<option value="'+p.nome+'" data-centro="'+(p.centroCusto||'')+'" '+(tarefa.projeto===p.nome?'selected':'')+'>'+p.nome+'</option>'; });
  html += '</select>';
  html += '<label>Centro de Custo (automático)</label><input type="text" id="tarCentro" value="'+(tarefa.centroCusto||'')+'" readonly>';
  html += '<label>Prazo</label><input type="date" id="tarPrazo" value="'+(tarefa.prazo||'')+'">';
  html += '<label>Status</label><select id="tarStatus">';
  ['Não iniciada','Em andamento','Concluída'].forEach(s => { html += '<option value="'+s+'" '+(tarefa.status===s?'selected':'')+'>'+s+'</option>'; });
  html += '</select>';
  html += '<label>Anexo Obrigatório?</label><select id="tarAnexoObrig">';
  html += '<option value="Não" '+(tarefa.anexoObrigatorio==='Não'?'selected':'')+'>Não</option>';
  html += '<option value="Sim" '+(tarefa.anexoObrigatorio==='Sim'?'selected':'')+'>Sim</option>';
  html += '</select>';
  html += '<div class="form-btns"><button onclick="salvarTarefaAdmin('+tarefa.id+')">💾 Salvar</button><button onclick="carregarListaTarefas()" style="background:#888;">Cancelar</button></div>';
  html += '</div>';
  document.getElementById('formTarefaContainer').innerHTML = html;
  document.getElementById('formTarefaContainer').scrollIntoView({behavior:'smooth'});
  if (tarefa.projeto) buscarCentroCusto(tarefa.projeto);
}

function buscarCentroCusto(nome) {
  const sel = document.getElementById('tarProjeto');
  const campo = document.getElementById('tarCentro');
  if (!sel||!campo) return;
  const opt = Array.from(sel.options).find(o=>o.value===nome);
  campo.value = opt ? (opt.getAttribute('data-centro')||'') : '';
}

async function editarTarefaAdmin(id) {
  const tarefas = await apiRequest('tarefas','GET');
  const t = (Array.isArray(tarefas)?tarefas:[]).find(t=>t.id==id);
  if (t) mostrarFormTarefa(t);
}

async function salvarTarefaAdmin(id) {
  const desc = document.getElementById('tarDesc').value.trim();
  const proj = document.getElementById('tarProjeto').value;
  const prazo = document.getElementById('tarPrazo').value;
  if (!desc||!proj||!prazo) { alert('Descrição, Projeto e Prazo são obrigatórios.'); return; }
  await apiRequest('tarefas','POST',{id, tarefa:desc, projeto:proj,
    centroCusto:document.getElementById('tarCentro').value,
    prazo, status:document.getElementById('tarStatus').value,
    anexoObrigatorio:document.getElementById('tarAnexoObrig').value
  });
  alert('Tarefa salva!'); carregarListaTarefas();
}

async function excluirTarefa(id) {
  if (!confirm('Excluir esta tarefa?')) return;
  await apiRequest('tarefas','DELETE',{id}); carregarListaTarefas();
}

// ===== IMPORTAÇÃO =====
function baixarModelo() {
  const csv = 'Tarefa,Projeto,Prazo Conclusao,Anexo Obrigatorio\nExemplo de tarefa,Nome Exato do Projeto,2025-12-31,Não\n';
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='modelo_importacao_tarefas.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function mostrarImportacao() {
  const c = document.getElementById('importacaoContainer');
  c.innerHTML = '<div class="import-box"><h4>📥 Importar Tarefas</h4>'+
    '<p style="font-size:13px;color:#555;">CSV ou Excel (.xlsx). Use <strong>Baixar Modelo</strong> para ver o formato correto.</p>'+
    '<p style="font-size:12px;color:#888;">Colunas: <strong>Tarefa, Projeto, Prazo Conclusao, Anexo Obrigatorio</strong>. Centro de Custo preenchido automaticamente.</p>'+
    '<input type="file" id="arquivoImport" accept=".csv,.xlsx,.xls">'+
    '<div class="form-btns"><button onclick="processarImportacao()" style="background:#27ae60;">✅ Importar</button>'+
    '<button onclick="document.getElementById(\'importacaoContainer\').innerHTML=\'\'" style="background:#888;">Cancelar</button></div>'+
    '<div id="resultadoImport" style="margin-top:10px;font-size:13px;"></div></div>';
  c.scrollIntoView({behavior:'smooth'});

async function processarImportacao() {
  const input = document.getElementById('arquivoImport');
  const res = document.getElementById('resultadoImport');
  if (!input||!input.files[0]) { res.innerHTML='<span style="color:red;">Selecione um arquivo.</span>'; return; }
  const arq = input.files[0];
  const nome = arq.name.toLowerCase();
  res.innerHTML = '<span class="loading">Processando...</span>';
  try {
    let linhas = [];
    if (nome.endsWith('.csv')) {
      const txt = await arq.text();
      linhas = txt.split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
    } else if (nome.endsWith('.xlsx')||nome.endsWith('.xls')) {
      if (typeof XLSX==='undefined') await carregarScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      const buf = await arq.arrayBuffer();
      const wb = XLSX.read(buf,{type:'array',cellDates:true});
      // raw:true + cellDates:true para receber objetos Date reais, evitando formatação local
      const wsJson = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,cellDates:true});
      linhas = wsJson.map(row => row.map(cell => {
        if (cell instanceof Date) {
          // Converte Date para yyyy-mm-dd
          const y = cell.getFullYear();
          const m = String(cell.getMonth()+1).padStart(2,'0');
          const d = String(cell.getDate()).padStart(2,'0');
          return y+'-'+m+'-'+d;
        }
        return cell === null || cell === undefined ? '' : String(cell);
      }));
    } else { res.innerHTML='<span style="color:red;">Use CSV ou XLSX.</span>'; return; }
    if (linhas.length<2) { res.innerHTML='<span style="color:red;">Arquivo vazio.</span>'; return; }
    const cab = linhas[0].map(c=>(c||'').toLowerCase().trim());
    const iT=cab.findIndex(c=>c.includes('tarefa')),iP=cab.findIndex(c=>c.includes('projeto'));
    const iPr=cab.findIndex(c=>c.includes('prazo')),iA=cab.findIndex(c=>c.includes('anexo'));
    if (iT<0||iP<0||iPr<0) { res.innerHTML='<span style="color:red;">Cabeçalho inválido.</span>'; return; }
    res.innerHTML='<span class="loading">Validando...</span>';
    const projCad = await apiRequest('projetos','GET');
    const mapProj = {};
    (Array.isArray(projCad)?projCad:[]).forEach(p=>{ mapProj[p.nome.toLowerCase()]=p; });
    const tarefasEx = await apiRequest('tarefas','GET');
    const arrEx = Array.isArray(tarefasEx)?tarefasEx:[];
    const erros=[],ignoradas=[],importar=[];
    for (let i=1;i<linhas.length;i++) {
      const l=linhas[i];
      if (!l||l.every(c=>!c)) continue;
      const desc=(l[iT]||'').trim(),proj=(l[iP]||'').trim(),prazo=(l[iPr]||'').trim();
      const anexo=(iA>=0?(l[iA]||''):'Não').trim()||'Não';
      if (!desc||!proj||!prazo) { erros.push('Linha '+(i+1)+': campos vazios.'); continue; }
      const pc=mapProj[proj.toLowerCase()];
      if (!pc) { erros.push('Linha '+(i+1)+': projeto "<strong>'+proj+'</strong>" não cadastrado.'); continue; }
      const dup=arrEx.find(t=>t.tarefa.toLowerCase()===desc.toLowerCase()&&t.projeto.toLowerCase()===proj.toLowerCase());
      if (dup) { ignoradas.push('Linha '+(i+1)+': "'+desc+'" já existe (ignorada).'); continue; }
      importar.push({tarefa:desc,projeto:pc.nome,centroCusto:pc.centroCusto||'',prazo,anexoObrigatorio:anexo,status:'Não iniciada'});
    }
    if (erros.length>0) { res.innerHTML='<div style="color:red;"><strong>❌ Erros — importação cancelada:</strong><ul>'+erros.map(e=>'<li>'+e+'</li>').join('')+'</ul></div>'; return; }
    if (importar.length===0) { res.innerHTML='<div style="color:#888;">Nenhuma tarefa nova.'+( ignoradas.length>0?'<br>'+ignoradas.join('<br>'):'' )+'</div>'; return; }
    if (!confirm('Importar '+importar.length+' tarefa(s)?'+(ignoradas.length>0?' ('+ignoradas.length+' duplicata(s) ignorada(s))':''))) { res.innerHTML='Cancelado.'; return; }
    res.innerHTML='<span class="loading">Importando...</span>';
    const csv=['Tarefa,Projeto,CentroCusto,Prazo,Status,Anexo Obrigatorio'];
    importar.forEach(t=>csv.push(t.tarefa+','+t.projeto+','+t.centroCusto+','+t.prazo+','+t.status+','+t.anexoObrigatorio));
    await apiRequest('importar-tarefas','POST',{csv:csv.join('\n')});
    let msg='<div style="color:green;"><strong>✅ '+importar.length+' tarefa(s) importada(s)!</strong></div>';
    if (ignoradas.length>0) msg+='<div style="color:#888;font-size:12px;">'+ignoradas.join('<br>')+'</div>';
    res.innerHTML=msg;
    setTimeout(carregarListaTarefas, 2000);
  } catch(e) { res.innerHTML='<span style="color:red;">Erro: '+e.message+'</span>'; }
}

function carregarScript(src) {
  return new Promise((resolve,reject)=>{ const s=document.createElement('script'); s.src=src; s.onload=resolve; s.onerror=reject; document.head.appendChild(s); });
}

  html+='<div class="form-field"><label>Nome</label><input type="text" id="usrNome" value="'+usr.nome+'">';
  html+='<label>Login</label><input type="text" id="usrLogin" value="'+usr.login+'" '+(isNovo?'':'readonly')+'>';
  html+='<label>Senha</label><input type="password" id="usrSenha" placeholder="'+(isNovo?'':'Deixe em branco para manter')+'">';

  html+='<option value="Usuario" '+(usr.nivel==='Usuario'?'selected':'')+'>Usuário</option>';

function toggleAcessos(nivel) {
  const s=document.getElementById('secaoAcessos');
  if (s) s.style.display=nivel==='Administrador'?'none':'';
}

async function editarUsuario(login) {
  const [usuarios,acessos]=await Promise.all([apiRequest('usuarios','GET'),apiRequest('acessos','GET')]);
  const u=(Array.isArray(usuarios)?usuarios:[]).find(u=>u.login===login);
  const acs=(Array.isArray(acessos)?acessos:[]).filter(a=>a.login===login).map(a=>a.projeto);
  if (u) mostrarFormUsuario(u,acs);
}

async function salvarUsuario(loginAntigo) {
  const nome=document.getElementById('usrNome').value.trim();
  const login=document.getElementById('usrLogin').value.trim();
  const senha=document.getElementById('usrSenha').value;
  const nivel=document.getElementById('usrNivel').value;
  if (!nome||!login) { alert('Nome e Login obrigatórios.'); return; }
  if (!loginAntigo&&!senha) { alert('Senha obrigatória para novo usuário.'); return; }
  await apiRequest('usuarios','POST',{nome,login,senha,nivel});
  if (nivel!=='Administrador') {
    const cbs=document.querySelectorAll('#checkProjetos input[type=checkbox]:checked');
    await apiRequest('acessos','POST',{login,projetos:Array.from(cbs).map(c=>c.value)});
  } else {
    await apiRequest('acessos','POST',{login,projetos:[]});
  }
  alert('Usuário salvo!'); carregarListaUsuarios();
}

async function excluirUsuario(login) {
  if (!confirm('Excluir "'+login+'"?')) return;
  await apiRequest('usuarios','DELETE',{login}); carregarListaUsuarios();
}

// ===== DASHBOARD / PAINEL GERAL =====
async function carregarDashboard() {
  document.getElementById('conteudo').innerHTML='<div class="loading-state">Carregando painel...</div>';
  try {
    const [projetos, tarefas, acessos] = await Promise.all([
      apiRequest('todos-projetos','GET'),
      apiRequest('todas-tarefas','GET'),
      apiRequest('acessos','GET')
    ]);
    const arrP=Array.isArray(projetos)?projetos:[];
    const arrT=Array.isArray(tarefas)?tarefas:[];
    const arrA=Array.isArray(acessos)?acessos:[];
    // Projetos do usuário atual
    const meusProjetos = arrA.filter(a=>a.login===usuario.login).map(a=>a.projeto);

    window._dashProjetos=arrP;
    window._dashTarefas=arrT;
    window._dashMeusProjetos=meusProjetos;

    // Calcula stats por projeto
    const tMap={};
    arrT.forEach(t=>{ if(!tMap[t.projeto]) tMap[t.projeto]=[]; tMap[t.projeto].push(t); });
    arrP.forEach(p=>{
      const arr=tMap[p.nome]||[];
      const total=arr.length,conc=arr.filter(t=>t.status==='Concluída').length;
      p._total=total; p._concluidas=conc; p._atraso=arr.filter(t=>t.sinalizador==='Atrasada').length;
      p._concluido=total>0&&conc===total;
    });

    let html='<h2 class="page-title">📈 Painel Geral</h2>';
    // Filtros
    html+='<div class="filtros-bar">';
    html+='<label>Projeto<select id="dashFiltroProjeto" style="min-width:180px;"><option value="">Todos</option>';
    arrP.forEach(p=>{ html+='<option value="'+p.nome+'">'+p.nome+'</option>'; });
    html+='</select></label>';
    html+='<label class="filtros-check"><input type="checkbox" id="dashFiltroMeus"> Somente meus projetos</label>';
    html+='<label class="filtros-check"><input type="checkbox" id="dashOcultarConc"> Ocultar concluídos</label>';
    html+='<button class="btn btn-primary" onclick="renderDashboard()">Filtrar</button>';
    html+='</div>';
    html+='<div id="dashConteudo"></div>';
    document.getElementById('conteudo').innerHTML=html;
    renderDashboard();
  } catch(e) { alert('Erro: '+e.message); }
}

function renderDashboard() {
  const fp=(document.getElementById('dashFiltroProjeto')||{}).value||'';
  const soMeus=(document.getElementById('dashFiltroMeus')||{}).checked||false;
  const ocultarConc=(document.getElementById('dashOcultarConc')||{}).checked||false;

  let projetos=(_dashProjetos||[]).slice();
  if (fp) projetos=projetos.filter(p=>p.nome===fp);
  if (soMeus) projetos=projetos.filter(p=>(_dashMeusProjetos||[]).includes(p.nome));
  if (ocultarConc) projetos=projetos.filter(p=>!p._concluido);

  const tarefasVisiveis=(_dashTarefas||[]).filter(t=>projetos.find(p=>p.nome===t.projeto));
  const naoIniciadas=tarefasVisiveis.filter(t=>t.status==='Não iniciada').length;
  const emAtraso=tarefasVisiveis.filter(t=>t.sinalizador==='Atrasada').length;
  const emAndamento=tarefasVisiveis.filter(t=>t.status==='Em andamento').length;
  const concluidas=tarefasVisiveis.filter(t=>t.status==='Concluída').length;

  let html='';
  // Dashboard cards
  html+='<div class="dash-cards">';
  html+='<div class="dash-card dc-nao"><h2>'+naoIniciadas+'</h2><p>Não Iniciadas</p></div>';
  html+='<div class="dash-card dc-atraso"><h2>'+emAtraso+'</h2><p>Em Atraso</p></div>';
  html+='<div class="dash-card dc-andamento"><h2>'+emAndamento+'</h2><p>Em Andamento</p></div>';
  html+='<div class="dash-card dc-concluida"><h2>'+concluidas+'</h2><p>Concluídas</p></div>';
  html+='</div>';

  // Gantt
  html+=renderGantt(projetos);
  document.getElementById('dashConteudo').innerHTML=html;

  // Scroll para hoje no Gantt
  setTimeout(()=>{
    const hoje=document.getElementById('gantt-hoje-col');
    if (hoje) hoje.scrollIntoView({inline:'center',behavior:'smooth'});
  },100);
}

function renderGantt(projetos) {
  if (!projetos||projetos.length===0) return '<p style="color:#888;margin-top:20px;">Nenhum projeto para exibir no Gantt.</p>';

  // Determina range de datas
  let minDate=null, maxDate=null;
  projetos.forEach(p=>{
    const datas=[p.inicioPrep,p.inicioDurante,p.fimDurante,p.fimDesmob].map(d=>parseISO(d)).filter(Boolean);
    datas.forEach(d=>{
      if (!minDate||d<minDate) minDate=d;
      if (!maxDate||d>maxDate) maxDate=d;
    });
  });
  if (!minDate||!maxDate) return '<p style="color:#888;">Projetos sem datas definidas.</p>';

  // Expande um mês antes e depois
  minDate=new Date(minDate.getFullYear(),minDate.getMonth()-1,1);
  maxDate=new Date(maxDate.getFullYear(),maxDate.getMonth()+2,0);

  // Lista de meses
  const meses=[];
  let cur=new Date(minDate.getFullYear(),minDate.getMonth(),1);
  while (cur<=maxDate) {
    meses.push(new Date(cur));
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  const hoje_d=parseISO(hoje());
  const totalDias=Math.round((maxDate-minDate)/(1000*60*60*24))+1;
  const PX_DIA=18; // pixels por dia

  function diaOffset(iso) {
    const d=parseISO(iso);
    if (!d) return null;
    return Math.round((d-minDate)/(1000*60*60*24));
  }
  function diaOffsetDate(d) {
    return Math.round((d-minDate)/(1000*60*60*24));
  }

  let html='<h3 style="margin-top:20px;">📅 Gantt de Projetos</h3>';
  html+='<div class="gantt-legenda">';
  html+='<span><i style="background:#3498db;"></i> Preparativo</span>';
  html+='<span><i style="background:#27ae60;"></i> Durante</span>';
  html+='<span><i style="background:#e67e22;"></i> Desmobilização</span>';
  html+='<span><i style="background:#e74c3c;width:3px;"></i> Hoje</span>';
  html+='</div>';
  html+='<div class="gantt-wrap"><table class="gantt-table">';

  // Cabeçalho — linha de meses
  const hojeOffset=diaOffsetDate(hoje_d);
  html+='<thead><tr>';
  html+='<th class="col-nome">Projeto</th>';
  meses.forEach(m=>{
    const diasMes=new Date(m.getFullYear(),m.getMonth()+1,0).getDate();
    const nomeMes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][m.getMonth()]+' '+m.getFullYear();
    html+='<th colspan="'+diasMes+'" style="text-align:center;min-width:'+(diasMes*PX_DIA)+'px;">'+nomeMes+'</th>';
  });
  html+='</tr></thead>';

  // Linha de dias (fina, só para referência da linha de hoje)
  // Usamos uma única linha de células de PX_DIA cada
  html+='<tbody>';
  projetos.forEach(p=>{
    html+='<tr>';
    html+='<td class="col-nome">'+p.nome+'</td>';

    // Calcula as fases
    const fases=[];
    const ip=p.inicioPrep, id=p.inicioDurante, fd=p.fimDurante, fm=p.fimDesmob;

    if (ip&&id) {
      const fim=addDias(id,-1);
      fases.push({ini:ip,fim:fim,cor:'bar-prep',label:'Prep'});
    }
    if (id&&fd) fases.push({ini:id,fim:fd,cor:'bar-durante',label:'Durante'});
    if (fd&&fm) {
      const ini=addDias(fd,1);
      fases.push({ini:ini,fim:fm,cor:'bar-desmob',label:'Desmob'});
    }

    // Cria array de células por dia
    // Para performance, construímos uma célula por mês com a barra sobreposta via posição absoluta
    // Usamos uma abordagem de célula única com div posicionado
    const rowStartOffset=0;
    const rowWidth=totalDias*PX_DIA;

    let barrasHTML='';
    fases.forEach(f=>{
      const o1=diaOffset(f.ini), o2=diaOffset(f.fim);
      if (o1===null||o2===null) return;
      const left=o1*PX_DIA, width=Math.max((o2-o1+1)*PX_DIA,PX_DIA);
      barrasHTML+='<div class="gantt-bar '+f.cor+'" style="position:absolute;left:'+left+'px;width:'+width+'px;top:5px;" title="'+f.label+': '+isoParaBR(f.ini)+' → '+isoParaBR(f.fim)+'"></div>';
    });
    // Linha de hoje
    if (hojeOffset>=0&&hojeOffset<totalDias) {
      const left=hojeOffset*PX_DIA;
      barrasHTML+='<div style="position:absolute;left:'+left+'px;top:0;width:2px;height:28px;background:#e74c3c;z-index:5;" id="gantt-hoje-col"></div>';
    }

    html+='<td colspan="'+totalDias+'" style="position:relative;height:28px;padding:0;min-width:'+rowWidth+'px;">'+barrasHTML+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// Sobrescreve referências antigas do HTML
// Redireciona IDs antigos para os novos
function _compat() {
  // loginContainer → loginPage
  const lc = document.getElementById('loginPage');
  if (lc) lc.id = 'loginPage';
  const ac = document.getElementById('appShell');
  if (ac) ac.id = 'appShell';
}
</script>
